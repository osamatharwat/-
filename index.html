<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>حصنك اليومي ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{
    background:
    radial-gradient(circle at top,#1e293b,#020617);
    color:white;
    min-height:100vh;
    overflow-x:hidden;
    padding:20px;
    transition:1s;
}

body.morning-theme{
    background:
    radial-gradient(circle at top,#f59e0b,#7c2d12);
}

body.evening-theme{
    background:
    radial-gradient(circle at top,#312e81,#020617);
}

body.quick-theme{
    background:
    radial-gradient(circle at top,#166534,#052e16);
}

.container{
    max-width:900px;
    margin:auto;
}

.header{
    text-align:center;
    margin-top:20px;
    margin-bottom:20px;
}

.logo{
    font-size:52px;
    font-weight:900;
    margin-bottom:10px;
}

.sadaka{
    color:#e2e8f0;
    font-size:14px;
}

.mascot-area{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin:20px 0 30px;
}

.mascot{
    font-size:90px;
    animation:bounce 2s infinite;
}

@keyframes bounce{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

}

.speech{
    background:white;
    color:#111827;
    padding:15px 25px;
    border-radius:20px;
    margin-top:10px;
    font-weight:bold;
    font-size:18px;
    max-width:320px;
    text-align:center;
    position:relative;
}

.speech::after{
    content:"";
    position:absolute;
    top:-10px;
    right:50%;
    transform:translateX(50%);
    border-width:10px;
    border-style:solid;
    border-color:transparent transparent white transparent;
}

.quote-box{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.1);
    padding:20px;
    border-radius:20px;
    text-align:center;
    margin-bottom:20px;
    font-size:20px;
    color:#fde68a;
}

.streak{
    text-align:center;
    margin-bottom:30px;
    font-size:22px;
    color:#fb7185;
    font-weight:bold;
}

.mode-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    margin-bottom:30px;
}

.mode-btn{
    border:none;
    padding:25px;
    border-radius:25px;
    cursor:pointer;
    color:white;
    font-size:20px;
    font-weight:bold;
    transition:.3s;
}

.mode-btn:hover{
    transform:translateY(-5px) scale(1.03);
}

.morning{
    background:linear-gradient(135deg,#f59e0b,#ea580c);
}

.evening{
    background:linear-gradient(135deg,#6366f1,#312e81);
}

.quick{
    background:linear-gradient(135deg,#22c55e,#166534);
}

.tasbeeh{
    background:linear-gradient(135deg,#06b6d4,#0f766e);
}

.card{
    display:none;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.1);
    padding:30px;
    border-radius:30px;
    backdrop-filter:blur(10px);
    animation:fade .4s ease;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

.top-stats{
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.stat{
    background:rgba(255,255,255,.08);
    padding:12px 18px;
    border-radius:15px;
}

.progress-container{
    width:100%;
    height:15px;
    background:#334155;
    border-radius:50px;
    overflow:hidden;
    margin-bottom:30px;
}

.progress{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#22c55e,#4ade80);
    transition:.4s;
}

.zekr-title{
    text-align:center;
    font-size:28px;
    margin-bottom:20px;
    color:#fde047;
}

.zekr-text{
    line-height:2.3;
    font-size:24px;
    text-align:center;
    margin-bottom:25px;
    white-space:pre-line;
}

.repeat{
    text-align:center;
    font-size:22px;
    margin-bottom:15px;
}

.counter{
    text-align:center;
    font-size:55px;
    font-weight:900;
    margin-bottom:25px;
}

.glow{
    animation:glow .4s ease;
}

@keyframes glow{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }

}

.btn{
    width:100%;
    border:none;
    padding:18px;
    border-radius:20px;
    cursor:pointer;
    color:white;
    font-size:22px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.02);
}

.main-btn{
    background:linear-gradient(135deg,#22c55e,#15803d);
}

.finish{
    display:none;
    text-align:center;
    padding:40px;
    animation:zoom .6s ease;
}

@keyframes zoom{

    from{
        opacity:0;
        transform:scale(.7);
    }

    to{
        opacity:1;
        transform:scale(1);
    }

}

.finish h2{
    font-size:50px;
    margin-bottom:20px;
}

.finish p{
    font-size:22px;
    color:#e2e8f0;
}

.tasbeeh-area{
    display:none;
}

.tasbeeh-select{
    width:100%;
    padding:15px;
    border-radius:15px;
    border:none;
    margin-bottom:20px;
    font-size:18px;
}

.tasbeeh-counter{
    text-align:center;
    font-size:80px;
    margin:30px 0;
    font-weight:900;
}

.footer{
    margin-top:40px;
    text-align:center;
    color:#cbd5e1;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="logo">
حصنك اليومي ✨
</div>

<div class="sadaka">
صدقة على روح
( خالد آدم - عمرو خالد - محمود فوزي )
</div>

</div>

<div class="mascot-area">

<div class="mascot">
🐥
</div>

<div class="speech" id="speech">
جاهز تبدأ وردك النهارده؟ 🌿
</div>

</div>

<div class="quote-box" id="quote"></div>

<div class="streak">
🔥 الاستريك:
<span id="streak">1</span>
يوم
</div>

<div class="mode-grid">

<button class="mode-btn morning"
onclick="startMode('morning')">
🌅 أذكار الصباح
</button>

<button class="mode-btn evening"
onclick="startMode('evening')">
🌙 أذكار المساء
</button>

<button class="mode-btn quick"
onclick="startMode('quick')">
⚡ الجامع المختصر
</button>

<button class="mode-btn tasbeeh"
onclick="openTasbeeh()">
📿 التسبيح الحر
</button>

</div>

<div class="card" id="card">

<div class="top-stats">

<div class="stat">
XP:
<span id="xp">0</span>
</div>

<div class="stat">
🔥 Combo:
<span id="combo">0</span>
</div>

</div>

<div class="progress-container">
<div class="progress" id="progress"></div>
</div>

<div class="zekr-title" id="zekrTitle"></div>

<div class="zekr-text" id="zekrText"></div>

<div class="repeat">
التكرار:
<span id="repeat"></span>
مرة
</div>

<div class="counter" id="counter">
0
</div>

<button class="btn main-btn"
onclick="countZekr()">
سبحت ✅
</button>

</div>

<div class="card tasbeeh-area" id="tasbeehArea">

<select class="tasbeeh-select">

<option>سبحان الله</option>
<option>الحمد لله</option>
<option>الله أكبر</option>
<option>لا إله إلا الله</option>
<option>استغفر الله</option>
<option>اللهم صل وسلم على نبينا محمد</option>

</select>

<div class="tasbeeh-counter" id="freeCounter">
0
</div>

<button class="btn main-btn"
onclick="increaseTasbeeh()">
📿 سبح
</button>

</div>

<div class="finish" id="finish">

<h2>
🏆 أحسنت
</h2>

<p id="finishText">
تم إنهاء الورد اليومي 🌿
</p>

</div>

<div class="footer">
شارك التطبيق تؤجر عليه ❤️
</div>

</div>

<script>

const quotes = [

"ألا بذكر الله تطمئن القلوب",
"واذكر ربك إذا نسيت",
"إن الله مع الصابرين",
"فاذكروني أذكركم",
"ولا تيأسوا من روح الله"

];

document.getElementById("quote").innerText =
quotes[Math.floor(Math.random()*quotes.length)];

const today = new Date().toDateString();

let lastVisit = localStorage.getItem("lastVisit");
let streak = localStorage.getItem("streak");

if(!streak){
streak = 1;
}

if(lastVisit !== today){

let yesterday = new Date();
yesterday.setDate(yesterday.getDate()-1);

if(lastVisit === yesterday.toDateString()){
streak++;
}else{
streak = 1;
}

localStorage.setItem("lastVisit",today);
localStorage.setItem("streak",streak);

}

document.getElementById("streak").innerText = streak;

const ayatKursi = `اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَن ذَا الَّذِي يَشْفَعُ عِندَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ`;

const data = {

morning:[

{
title:"آية الكرسي",
text:ayatKursi,
repeat:1
},

{
title:"سورة الإخلاص",
text:`قُلْ هُوَ اللَّهُ أَحَدٌ
اللَّهُ الصَّمَدُ
لَمْ يَلِدْ وَلَمْ يُولَدْ
وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ`,
repeat:3
},

{
title:"سورة الفلق",
text:`قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ
مِن شَرِّ مَا خَلَقَ
وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ
وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ
وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ`,
repeat:3
},

{
title:"سورة الناس",
text:`قُلْ أَعُوذُ بِرَبِّ النَّاسِ
مَلِكِ النَّاسِ
إِلَٰهِ النَّاسِ
مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ
الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ
مِنَ الْجِنَّةِ وَالنَّاسِ`,
repeat:3
},

{
title:"رضيت بالله ربًا",
text:`رَضِيتُ بِاللَّهِ رَبًّا وَبِالإِسْلَامِ دِينًا وَبِمُحَمَّدٍ ﷺ نَبِيًّا`,
repeat:3
},

{
title:"سبحان الله وبحمده",
text:`سُبْحَانَ اللَّهِ وَبِحَمْدِهِ`,
repeat:100
}

],

evening:[

{
title:"آية الكرسي",
text:ayatKursi,
repeat:1
},

{
title:"سورة الإخلاص",
text:`قُلْ هُوَ اللَّهُ أَحَدٌ
اللَّهُ الصَّمَدُ
لَمْ يَلِدْ وَلَمْ يُولَدْ
وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ`,
repeat:3
},

{
title:"سورة الفلق",
text:`قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ
مِن شَرِّ مَا خَلَقَ`,
repeat:3
},

{
title:"سورة الناس",
text:`قُلْ أَعُوذُ بِرَبِّ النَّاسِ
مَلِكِ النَّاسِ`,
repeat:3
},

{
title:"حسبي الله",
text:`حَسْبِيَ اللَّهُ لَا إِلَهَ إِلَّا هُوَ عَلَيْهِ تَوَكَّلْتُ وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ`,
repeat:7
}

],

quick:[

{
title:"بسم الله الذي لا يضر",
text:`بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ`,
repeat:3
},

{
title:"أعوذ بكلمات الله",
text:`أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ`,
repeat:3
},

{
title:"لا إله إلا الله وحده",
text:`لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ`,
repeat:10
}

]

};

let currentMode = [];
let currentIndex = 0;
let currentCount = 0;
let xp = 0;
let combo = 0;

function startMode(mode){

document.body.classList.remove(
"morning-theme",
"evening-theme",
"quick-theme"
);

if(mode === "morning"){

document.body.classList.add("morning-theme");

document.getElementById("speech").innerText =
"صباح الأذكار نور ليومك ☀️";

}

if(mode === "evening"){

document.body.classList.add("evening-theme");

document.getElementById("speech").innerText =
"أذكار المساء سكينة وطمأنينة 🌙";

}

if(mode === "quick"){

document.body.classList.add("quick-theme");

document.getElementById("speech").innerText =
"ورد قليل.. لكن أجره عظيم ✨";

}

document.getElementById("finish").style.display="none";
document.getElementById("tasbeehArea").style.display="none";
document.getElementById("card").style.display="block";

currentMode = data[mode];

currentIndex = 0;
currentCount = 0;
xp = 0;
combo = 0;

loadZekr();

}

function loadZekr(){

const item = currentMode[currentIndex];

document.getElementById("zekrTitle").innerText =
item.title;

document.getElementById("zekrText").innerText =
item.text;

document.getElementById("repeat").innerText =
item.repeat;

document.getElementById("counter").innerText =
`${currentCount}/${item.repeat}`;

updateProgress();

}

const motivationalTexts = [

"أنت رائع.. كمل 🌿",
"باقي قليل جدًا ✨",
"الملائكة تكتب لك الآن 🤍",
"وردك النهارده جميل جدًا ☀️",
"استمر يا بطل 💚",
"كل تسبيحة نور 🤲",
"ربنا يثبتك 🌸"

];

function countZekr(){

navigator.vibrate?.(40);

const item = currentMode[currentIndex];

currentCount++;

xp += 5;
combo++;

document.getElementById("xp").innerText = xp;
document.getElementById("combo").innerText = combo;

document.getElementById("counter").innerText =
`${currentCount}/${item.repeat}`;

document.getElementById("counter")
.classList.add("glow");

setTimeout(()=>{

document.getElementById("counter")
.classList.remove("glow");

},300);

let randomText =
motivationalTexts[
Math.floor(Math.random()*motivationalTexts.length)
];

document.getElementById("speech").innerText =
randomText;

if(currentCount >= item.repeat){

currentIndex++;
currentCount = 0;

if(currentIndex >= currentMode.length){

document.getElementById("card").style.display="none";
document.getElementById("finish").style.display="block";

document.getElementById("speech").innerText =
"أشطر كتكوت 🐥🏆";

if(document.body.classList.contains("morning-theme")){

document.getElementById("finishText").innerText =
"ورد الصباح خلص ✨ متنساش ترجع لأذكار المساء الليلة 🌙";

}

else if(document.body.classList.contains("evening-theme")){

document.getElementById("finishText").innerText =
"ورد المساء اكتمل 🌿 نراك صباحًا بإذن الله ☀️";

}

else{

document.getElementById("finishText").innerText =
"وردك النهارده جميل جدًا 🤍";

}

return;

}

loadZekr();

}

}

function updateProgress(){

let percent =
(currentIndex/currentMode.length)*100;

document.getElementById("progress").style.width =
percent + "%";

}

let freeCounter = 0;

function openTasbeeh(){

document.getElementById("card").style.display="none";
document.getElementById("finish").style.display="none";
document.getElementById("tasbeehArea").style.display="block";

document.getElementById("speech").innerText =
"سبح براحتك 🤍";

}

function increaseTasbeeh(){

navigator.vibrate?.(40);

freeCounter++;

document.getElementById("freeCounter").innerText =
freeCounter;

}

</script>

</body>
</html>

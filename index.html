<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>حصنك اليومي ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
}

html{
scroll-behavior:smooth;
}

body{
background:#0f172a;
color:#fff;
min-height:100vh;
overflow-x:hidden;
padding:12px;
transition:.5s;
}

/* THEMES */

body.morning-theme{
background:#eef4f8;
color:#0f172a;
}

body.evening-theme{
background:#0f172a;
color:#fff;
}

body.quick-theme{
background:#102a22;
color:#fff;
}

/* CONTAINER */

.container{
max-width:480px;
margin:auto;
}

/* HERO */

.hero{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:24px;
text-align:center;
margin-bottom:16px;
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(10px);
}

.hero h1{
font-size:30px;
margin-bottom:8px;
}

.hero p{
font-size:22px;
font-weight:900;
line-height:1.8;
color:#fde68a;
}

/* QUOTE */

.quote{
background:rgba(255,255,255,.75);
color:#475569;
padding:14px;
border-radius:18px;
text-align:center;
line-height:1.8;
margin-bottom:14px;
}

/* STREAK */

.streak{
text-align:center;
font-size:18px;
font-weight:800;
margin-bottom:18px;
color:#f97316;
}

/* BUTTONS */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:18px;
}

.btn-mode{
border:none;
padding:16px;
border-radius:20px;
color:#fff;
font-size:15px;
font-weight:800;
cursor:pointer;
}

.morning{
background:linear-gradient(135deg,#38bdf8,#2563eb);
}

.evening{
background:linear-gradient(135deg,#6366f1,#312e81);
}

.quick{
background:linear-gradient(135deg,#22c55e,#15803d);
}

.tasbeeh{
background:linear-gradient(135deg,#06b6d4,#0f766e);
}

/* CARD */

.card{
display:none;
background:rgba(255,255,255,.82);
padding:18px;
border-radius:24px;
backdrop-filter:blur(8px);
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

/* TOP */

.top{
display:flex;
justify-content:space-between;
align-items:center;
gap:8px;
margin-bottom:16px;
}

.stats{
display:flex;
gap:8px;
}

.stat{
background:#fff;
color:#0f172a;
padding:8px 12px;
border-radius:12px;
font-size:13px;
font-weight:700;
}

.chick{
display:flex;
align-items:center;
gap:8px;
}

.chick-emoji{
font-size:42px;
animation:floaty 3s infinite;
}

@keyframes floaty{
50%{
transform:translateY(-5px);
}
}

.speech{
background:#fff;
color:#0f172a;
padding:8px 12px;
border-radius:14px;
font-size:11px;
font-weight:800;
max-width:120px;
line-height:1.6;
}

/* PROGRESS */

.progress-wrap{
height:10px;
background:#cbd5e1;
border-radius:50px;
overflow:hidden;
margin-bottom:18px;
}

.progress{
height:100%;
width:0;
background:linear-gradient(90deg,#22c55e,#16a34a);
transition:.3s;
}

/* TEXT */

.title{
text-align:center;
color:#ca8a04;
font-size:22px;
font-weight:800;
margin-bottom:14px;
}

.text{
color:#0f172a;
font-size:20px;
line-height:2.4;
text-align:center;
font-weight:600;
white-space:pre-line;
margin-bottom:18px;
}

.repeat{
text-align:center;
font-size:16px;
margin-bottom:10px;
color:#334155;
}

.counter{
text-align:center;
font-size:42px;
font-weight:900;
margin-bottom:16px;
color:#0f172a;
}

/* BUTTON */

.main-btn{
width:100%;
border:none;
background:linear-gradient(135deg,#22c55e,#15803d);
padding:16px;
border-radius:18px;
color:#fff;
font-size:18px;
font-weight:800;
cursor:pointer;
}

/* FINISH */

.finish{
display:none;
text-align:center;
padding:30px 10px;
}

.finish h2{
font-size:36px;
margin-bottom:10px;
}

.finish p{
font-size:18px;
line-height:1.8;
color:#475569;
}

.footer{
text-align:center;
color:#94a3b8;
font-size:12px;
margin-top:24px;
padding-bottom:40px;
}

</style>

</head>

<body>

<div class="container">

<div class="hero">
<h1>حصنك اليومي ✨</h1>
<p>
🤍 صدقة جارية على روح<br>
خالد آدم • عمرو خالد • محمود فوزي
</p>
</div>

<div class="quote" id="quote"></div>

<div class="streak">
🔥 الاستريك:
<span id="streak">0</span>
يوم
</div>

<div class="grid">

<button class="btn-mode morning" onclick="startMode('morning')">
🌅 أذكار الصباح
</button>

<button class="btn-mode evening" onclick="startMode('evening')">
🌙 أذكار المساء
</button>

<button class="btn-mode quick" onclick="startMode('quick')">
⚡ الجامع المختصر
</button>

<button class="btn-mode tasbeeh">
📿 التسبيح الحر
</button>

</div>

<div class="card" id="card">

<div class="top">

<div class="stats">

<div class="stat">
XP:
<span id="xp">0</span>
</div>

<div class="stat">
🔥 Combo:
<span id="combo">0</span>
</div>

</div>

<div class="chick">

<div class="speech" id="speech">
جاهز تبدأ؟ 🌿
</div>

<div class="chick-emoji">
🐥
</div>

</div>

</div>

<div class="progress-wrap">
<div class="progress" id="progress"></div>
</div>

<div class="title" id="zekrTitle"></div>

<div class="text" id="zekrText"></div>

<div class="repeat">
التكرار:
<span id="repeat"></span>
مرة
</div>

<div class="counter" id="counter">
0
</div>

<button class="main-btn" onclick="countZekr()">
سبحت ✅
</button>

</div>

<div class="finish" id="finish">

<h2>
🏆 أحسنت
</h2>

<p id="finishText">
تم إنهاء الورد اليومي 🌿
</p>

</div>

<div class="footer">
شارك التطبيق تؤجر عليه ❤️
</div>

</div>

<script>

const quotes = [

"ألا بذكر الله تطمئن القلوب",
"واذكر ربك إذا نسيت",
"إن الله مع الصابرين",
"فاذكروني أذكركم",
"ولا تيأسوا من روح الله",
"كل تسبيحة نور 🤍",
"جنة القلب في ذكر الله"

];

document.getElementById("quote").innerText =
quotes[Math.floor(Math.random()*quotes.length)];

const ayatKursi =
`اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَن ذَا الَّذِي يَشْفَعُ عِندَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ`;

const data = {

morning:[
{
title:"آية الكرسي",
text:ayatKursi,
repeat:1
},
{
title:"سورة الإخلاص",
text:`قُلْ هُوَ اللَّهُ أَحَدٌ
اللَّهُ الصَّمَدُ
لَمْ يَلِدْ وَلَمْ يُولَدْ
وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ`,
repeat:3
},
{
title:"سورة الفلق",
text:`قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ
مِن شَرِّ مَا خَلَقَ
وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ
وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ
وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ`,
repeat:3
},
{
title:"سورة الناس",
text:`قُلْ أَعُوذُ بِرَبِّ النَّاسِ
مَلِكِ النَّاسِ
إِلَٰهِ النَّاسِ
مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ
الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ
مِنَ الْجِنَّةِ وَالنَّاسِ`,
repeat:3
}
],

evening:[
{
title:"آية الكرسي",
text:ayatKursi,
repeat:1
}
],

quick:[
{
title:"بسم الله الذي لا يضر",
text:`بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ`,
repeat:3
}
]

};

let currentMode = [];
let currentIndex = 0;
let currentCount = 0;
let xp = 0;
let combo = 0;

function startMode(mode){

document.body.className = "";

if(mode === "morning"){
document.body.classList.add("morning-theme");
}

if(mode === "evening"){
document.body.classList.add("evening-theme");
}

if(mode === "quick"){
document.body.classList.add("quick-theme");
}

document.getElementById("card").style.display = "block";

currentMode = data[mode];

currentIndex = 0;
currentCount = 0;
xp = 0;
combo = 0;

loadZekr();

}

function loadZekr(){

const item = currentMode[currentIndex];

document.getElementById("zekrTitle").innerText =
item.title;

document.getElementById("zekrText").innerText =
item.text;

document.getElementById("repeat").innerText =
item.repeat;

document.getElementById("counter").innerText =
`${currentCount}/${item.repeat}`;

updateProgress();

}

function countZekr(){

const item = currentMode[currentIndex];

currentCount++;

xp += 5;
combo++;

document.getElementById("xp").innerText = xp;
document.getElementById("combo").innerText = combo;

document.getElementById("counter").innerText =
`${currentCount}/${item.repeat}`;

if(currentCount >= item.repeat){

currentIndex++;
currentCount = 0;

if(currentIndex >= currentMode.length){

document.getElementById("card").style.display = "none";

document.getElementById("finish").style.display = "block";

document.getElementById("speech").innerText =
"أشطر كتكوت 🐥🏆";

return;

}

loadZekr();

}

}

function updateProgress(){

document.getElementById("progress").style.width =
((currentIndex/currentMode.length)*100)+"%";

}

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>

<title>حصنك اليومي ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
    -webkit-tap-highlight-color:transparent;
}

html{
    scroll-behavior:smooth;
}

body{

    background:
    radial-gradient(circle at top,#1e293b,#020617);

    color:white;

    min-height:100vh;

    overflow-x:hidden;

    padding:12px;

    transition:1s;

}

body.morning-theme{
    background:
    radial-gradient(circle at top,#f59e0b,#7c2d12);
}

body.evening-theme{
    background:
    radial-gradient(circle at top,#312e81,#020617);
}

body.quick-theme{
    background:
    radial-gradient(circle at top,#166534,#052e16);
}

.container{

    width:100%;

    max-width:480px;

    margin:auto;

}

.header{

    text-align:center;

    margin-top:6px;

    margin-bottom:16px;

}

.hero-sadaka{

    background:
    linear-gradient(
    135deg,
    rgba(255,255,255,.12),
    rgba(255,255,255,.05)
    );

    border:1px solid rgba(255,255,255,.1);

    padding:18px 14px;

    border-radius:24px;

    margin-bottom:18px;

    backdrop-filter:blur(10px);

}

.sadaka-title{

    font-size:18px;

    font-weight:800;

    color:#fde68a;

    margin-bottom:10px;

}

.sadaka-names{

    font-size:22px;

    font-weight:900;

    line-height:1.8;

}

.logo{

    font-size:30px;

    font-weight:900;

}

.quote-box{

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.1);

    padding:14px;

    border-radius:18px;

    text-align:center;

    margin-bottom:14px;

    font-size:15px;

    color:#fde68a;

    line-height:1.8;

}

.streak{

    text-align:center;

    margin-bottom:18px;

    font-size:16px;

    color:#fb7185;

    font-weight:bold;

}

.mode-grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:10px;

    margin-bottom:18px;

}

.mode-btn{

    border:none;

    padding:16px 10px;

    border-radius:20px;

    cursor:pointer;

    color:white;

    font-size:15px;

    font-weight:800;

    transition:.3s;

}

.mode-btn:active{
    transform:scale(.96);
}

.morning{
    background:linear-gradient(135deg,#f59e0b,#ea580c);
}

.evening{
    background:linear-gradient(135deg,#6366f1,#312e81);
}

.quick{
    background:linear-gradient(135deg,#22c55e,#166534);
}

.tasbeeh{
    background:linear-gradient(135deg,#06b6d4,#0f766e);
}

.card{

    display:none;

    background:rgba(255,255,255,.06);

    border:1px solid rgba(255,255,255,.1);

    padding:16px;

    border-radius:24px;

    backdrop-filter:blur(10px);

    animation:fade .4s ease;

    position:relative;

}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

.top-stats{

    display:flex;

    justify-content:space-between;

    margin-bottom:16px;

    gap:10px;

}

.stat{

    background:rgba(255,255,255,.08);

    padding:8px 12px;

    border-radius:12px;

    font-size:13px;

}

.progress-container{

    width:100%;

    height:10px;

    background:#334155;

    border-radius:50px;

    overflow:hidden;

    margin-bottom:16px;

}

.progress{

    height:100%;

    width:0%;

    background:linear-gradient(90deg,#22c55e,#4ade80);

    transition:.4s;

}

.floating-mascot{

    position:fixed;

    bottom:18px;

    left:14px;

    z-index:999;

    display:flex;

    align-items:flex-end;

    gap:8px;

    animation:floaty 3s infinite ease-in-out;

}

@keyframes floaty{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-6px);
    }

}

.mascot{

    font-size:52px;

}

.speech{

    background:white;

    color:#111827;

    padding:10px 14px;

    border-radius:16px;

    font-size:12px;

    font-weight:700;

    max-width:160px;

    line-height:1.6;

    box-shadow:0 10px 20px rgba(0,0,0,.2);

}

.zekr-title{

    text-align:center;

    font-size:20px;

    color:#fde047;

    margin-bottom:14px;

    font-weight:800;

}

.zekr-text{

    line-height:2.2;

    font-size:18px;

    text-align:center;

    margin-bottom:18px;

    white-space:pre-line;

}

.repeat{

    text-align:center;

    font-size:16px;

    margin-bottom:10px;

}

.counter{

    text-align:center;

    font-size:40px;

    font-weight:900;

    margin-bottom:16px;

}

.glow{

    animation:glow .4s ease;

}

@keyframes glow{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }

}

.btn{

    width:100%;

    border:none;

    padding:16px;

    border-radius:18px;

    cursor:pointer;

    color:white;

    font-size:18px;

    font-weight:800;

}

.main-btn{
    background:linear-gradient(135deg,#22c55e,#15803d);
}

.finish{

    display:none;

    text-align:center;

    padding:24px 8px;

}

.finish h2{

    font-size:34px;

    margin-bottom:12px;

}

.finish p{

    font-size:17px;

    line-height:1.8;

    color:#e2e8f0;

}

.tasbeeh-area{
    display:none;
}

.tasbeeh-select{

    width:100%;

    padding:14px;

    border-radius:16px;

    border:none;

    margin-bottom:18px;

    font-size:16px;

}

.tasbeeh-counter{

    text-align:center;

    font-size:58px;

    margin:24px 0;

    font-weight:900;

}

.footer{

    text-align:center;

    margin-top:24px;

    color:#cbd5e1;

    font-size:12px;

    padding-bottom:80px;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="hero-sadaka">

<div class="sadaka-title">
🤍 صدقة جارية على روح 🤍
</div>

<div class="sadaka-names">
خالد آدم • عمرو خالد • محمود فوزي
</div>

</div>

<div class="logo">
حصنك اليومي ✨
</div>

</div>

<div class="quote-box" id="quote"></div>

<div class="streak">
🔥 الاستريك:
<span id="streak">1</span>
يوم
</div>

<div class="mode-grid">

<button class="mode-btn morning"
onclick="startMode('morning')">
🌅 أذكار الصباح
</button>

<button class="mode-btn evening"
onclick="startMode('evening')">
🌙 أذكار المساء
</button>

<button class="mode-btn quick"
onclick="startMode('quick')">
⚡ الجامع المختصر
</button>

<button class="mode-btn tasbeeh"
onclick="openTasbeeh()">
📿 التسبيح الحر
</button>

</div>

<div class="card" id="card">

<div class="top-stats">

<div class="stat">
XP:
<span id="xp">0</span>
</div>

<div class="stat">
🔥 Combo:
<span id="combo">0</span>
</div>

</div>

<div class="progress-container">
<div class="progress" id="progress"></div>
</div>

<div class="zekr-title" id="zekrTitle"></div>

<div class="zekr-text" id="zekrText"></div>

<div class="repeat">
التكرار:
<span id="repeat"></span>
مرة
</div>

<div class="counter" id="counter">
0
</div>

<button class="btn main-btn"
onclick="countZekr()">
سبحت ✅
</button>

</div>

<div class="card tasbeeh-area" id="tasbeehArea">

<select class="tasbeeh-select">

<option>سبحان الله</option>
<option>الحمد لله</option>
<option>الله أكبر</option>
<option>لا إله إلا الله</option>
<option>استغفر الله</option>
<option>اللهم صل وسلم على نبينا محمد ﷺ</option>

</select>

<div class="tasbeeh-counter" id="freeCounter">
0
</div>

<button class="btn main-btn"
onclick="increaseTasbeeh()">
📿 سبح
</button>

</div>

<div class="finish" id="finish">

<h2>
🏆 أحسنت
</h2>

<p id="finishText">
تم إنهاء الورد اليومي 🌿
</p>

</div>

<div class="footer">
شارك التطبيق تؤجر عليه ❤️
</div>

</div>

<div class="floating-mascot">

<div class="mascot">
🐥
</div>

<div class="speech" id="speech">
جاهز تبدأ وردك النهارده؟ 🌿
</div>

</div>

<script>

const quotes = [

"ألا بذكر الله تطمئن القلوب",
"واذكر ربك إذا نسيت",
"إن الله مع الصابرين",
"فاذكروني أذكركم",
"ولا تيأسوا من روح الله"

];

document.getElementById("quote").innerText =
quotes[Math.floor(Math.random()*quotes.length)];

const today = new Date().toDateString();

let lastVisit = localStorage.getItem("lastVisit");
let streak = localStorage.getItem("streak");

if(!streak){
streak = 1;
}

if(lastVisit !== today){

let yesterday = new Date();

yesterday.setDate(
yesterday.getDate()-1
);

if(lastVisit === yesterday.toDateString()){

streak++;

}else{

streak = 1;

}

localStorage.setItem(
"lastVisit",
today
);

localStorage.setItem(
"streak",
streak
);

}

document.getElementById("streak")
.innerText = streak;

const ayatKursi = `اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَن ذَا الَّذِي يَشْفَعُ عِندَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ`;

const data = {

morning:[

{
title:"آية الكرسي",
text:ayatKursi,
repeat:1
},

{
title:"سورة الإخلاص",
text:`قُلْ هُوَ اللَّهُ أَحَدٌ
اللَّهُ الصَّمَدُ
لَمْ يَلِدْ وَلَمْ يُولَدْ
وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ`,
repeat:3
},

{
title:"سورة الفلق",
text:`قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ
مِن شَرِّ مَا خَلَقَ
وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ
وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ
وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ`,
repeat:3
},

{
title:"سورة الناس",
text:`قُلْ أَعُوذُ بِرَبِّ النَّاسِ
مَلِكِ النَّاسِ
إِلَٰهِ النَّاسِ
مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ
الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ
مِنَ الْجِنَّةِ وَالنَّاسِ`,
repeat:3
},

{
title:"أصبحنا وأصبح الملك لله",
text:`أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ`,
repeat:1
},

{
title:"سيد الاستغفار",
text:`اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ`,
repeat:1
},

{
title:"اللهم إني أصبحت أُشهدك",
text:`اللَّهُمَّ إِنِّي أَصْبَحْتُ أُشْهِدُكَ وَأُشْهِدُ حَمَلَةَ عَرْشِكَ وَمَلَائِكَتَكَ وَجَمِيعَ خَلْقِكَ أَنَّكَ أَنْتَ اللَّهُ`,
repeat:4
},

{
title:"اللهم ما أصبح بي من نعمة",
text:`اللَّهُمَّ مَا أَصْبَحَ بِي مِنْ نِعْمَةٍ أَوْ بِأَحَدٍ مِنْ خَلْقِكَ فَمِنْكَ وَحْدَكَ`,
repeat:1
},

{
title:"حسبي الله",
text:`حَسْبِيَ اللَّهُ لَا إِلَهَ إِلَّا هُوَ عَلَيْهِ تَوَكَّلْتُ وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ`,
repeat:7
},

{
title:"بسم الله الذي لا يضر",
text:`بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ`,
repeat:3
},

{
title:"رضيت بالله ربًا",
text:`رَضِيتُ بِاللَّهِ رَبًّا وَبِالإِسْلَامِ دِينًا وَبِمُحَمَّدٍ ﷺ نَبِيًّا`,
repeat:3
},

{
title:"يا حي يا قيوم",
text:`يَا حَيُّ يَا قَيُّومُ بِرَحْمَتِكَ أَسْتَغِيثُ`,
repeat:1
},

{
title:"أصبحنا على فطرة الإسلام",
text:`أَصْبَحْنَا عَلَى فِطْرَةِ الإِسْلَامِ وَعَلَى كَلِمَةِ الإِخْلَاصِ`,
repeat:1
},

{
title:"سبحان الله وبحمده",
text:`سُبْحَانَ اللَّهِ وَبِحَمْدِهِ`,
repeat:100
},

{
title:"لا إله إلا الله وحده",
text:`لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ`,
repeat:100
}

],

evening:[

{
title:"آية الكرسي",
text:ayatKursi,
repeat:1
},

{
title:"سورة الإخلاص",
text:`قُلْ هُوَ اللَّهُ أَحَدٌ
اللَّهُ الصَّمَدُ
لَمْ يَلِدْ وَلَمْ يُولَدْ
وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ`,
repeat:3
},

{
title:"سورة الفلق",
text:`قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ
مِن شَرِّ مَا خَلَقَ
وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ
وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ
وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ`,
repeat:3
},

{
title:"سورة الناس",
text:`قُلْ أَعُوذُ بِرَبِّ النَّاسِ
مَلِكِ النَّاسِ
إِلَٰهِ النَّاسِ
مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ
الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ
مِنَ الْجِنَّةِ وَالنَّاسِ`,
repeat:3
},

{
title:"أمسينا وأمسى الملك لله",
text:`أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ وَالْحَمْدُ لِلَّهِ`,
repeat:1
},

{
title:"سيد الاستغفار",
text:`اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ`,
repeat:1
},

{
title:"اللهم إني أمسيت أُشهدك",
text:`اللَّهُمَّ إِنِّي أَمْسَيْتُ أُشْهِدُكَ`,
repeat:4
},

{
title:"اللهم ما أمسى بي من نعمة",
text:`اللَّهُمَّ مَا أَمْسَى بِي مِنْ نِعْمَةٍ`,
repeat:1
},

{
title:"حسبي الله",
text:`حَسْبِيَ اللَّهُ لَا إِلَهَ إِلَّا هُوَ`,
repeat:7
},

{
title:"بسم الله الذي لا يضر",
text:`بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ`,
repeat:3
},

{
title:"رضيت بالله ربًا",
text:`رَضِيتُ بِاللَّهِ رَبًّا`,
repeat:3
},

{
title:"يا حي يا قيوم",
text:`يَا حَيُّ يَا قَيُّومُ`,
repeat:1
},

{
title:"أمسينا على فطرة الإسلام",
text:`أَمْسَيْنَا عَلَى فِطْرَةِ الإِسْلَامِ`,
repeat:1
},

{
title:"سبحان الله وبحمده",
text:`سُبْحَانَ اللَّهِ وَبِحَمْدِهِ`,
repeat:100
},

{
title:"لا إله إلا الله وحده",
text:`لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ`,
repeat:100
}

],

quick:[

{
title:"بسم الله الذي لا يضر",
text:`بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ`,
repeat:3
},

{
title:"أعوذ بكلمات الله التامات",
text:`أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ`,
repeat:3
},

{
title:"لا إله إلا الله وحده",
text:`لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ`,
repeat:10
}

]

};

let currentMode = [];
let currentIndex = 0;
let currentCount = 0;
let xp = 0;
let combo = 0;

function startMode(mode){

document.body.classList.remove(
"morning-theme",
"evening-theme",
"quick-theme"
);

if(mode === "morning"){

document.body.classList.add(
"morning-theme"
);

document.getElementById("speech")
.innerText =
"صباح الأذكار نور ☀️";

}

if(mode === "evening"){

document.body.classList.add(
"evening-theme"
);

document.getElementById("speech")
.innerText =
"سكينة المساء 🌙";

}

if(mode === "quick"){

document.body.classList.add(
"quick-theme"
);

document.getElementById("speech")
.innerText =
"ورد بسيط وأجر كبير ✨";

}

document.getElementById("finish")
.style.display="none";

document.getElementById("tasbeehArea")
.style.display="none";

document.getElementById("card")
.style.display="block";

currentMode = data[mode];

currentIndex = 0;

currentCount = 0;

xp = 0;

combo = 0;

loadZekr();

setTimeout(()=>{

document.getElementById("card")
.scrollIntoView({
behavior:"smooth"
});

},100);

}

function loadZekr(){

const item =
currentMode[currentIndex];

document.getElementById("zekrTitle")
.innerText = item.title;

document.getElementById("zekrText")
.innerText = item.text;

document.getElementById("repeat")
.innerText = item.repeat;

document.getElementById("counter")
.innerText =
`${currentCount}/${item.repeat}`;

updateProgress();

}

const motivationalTexts = [

"أنت رائع 🌿",
"استمر يا بطل 💚",
"كل تسبيحة نور 🤲",
"الملائكة تكتب لك الآن 🤍",
"باقي القليل ✨"

];

function countZekr(){

navigator.vibrate?.(40);

const item =
currentMode[currentIndex];

currentCount++;

xp += 5;

combo++;

document.getElementById("xp")
.innerText = xp;

document.getElementById("combo")
.innerText = combo;

document.getElementById("counter")
.innerText =
`${currentCount}/${item.repeat}`;

document.getElementById("counter")
.classList.add("glow");

setTimeout(()=>{

document.getElementById("counter")
.classList.remove("glow");

},300);

document.getElementById("speech")
.innerText =

motivationalTexts[
Math.floor(
Math.random()*
motivationalTexts.length
)
];

if(currentCount >= item.repeat){

currentIndex++;

currentCount = 0;

if(currentIndex >= currentMode.length){

document.getElementById("card")
.style.display="none";

document.getElementById("finish")
.style.display="block";

document.getElementById("speech")
.innerText =
"أشطر كتكوت 🐥🏆";

if(
document.body.classList.contains(
"morning-theme"
)
){

document.getElementById(
"finishText"
).innerText =

"ورد الصباح اكتمل ✨ متنساش ترجع لأذكار المساء 🌙";

}else if(
document.body.classList.contains(
"evening-theme"
)
){

document.getElementById(
"finishText"
).innerText =

"ورد المساء اكتمل 🌿 نراك صباحًا ☀️";

}else{

document.getElementById(
"finishText"
).innerText =

"وردك النهارده جميل جدًا 🤍";

}

return;

}

loadZekr();

}

}

function updateProgress(){

let percent =

(currentIndex /
currentMode.length)*100;

document.getElementById("progress")
.style.width =
percent + "%";

}

let freeCounter = 0;

function openTasbeeh(){

document.getElementById("card")
.style.display="none";

document.getElementById("finish")
.style.display="none";

document.getElementById("tasbeehArea")
.style.display="block";

document.getElementById("speech")
.innerText =
"سبح براحتك 🤍";

setTimeout(()=>{

document.getElementById(
"tasbeehArea"
).scrollIntoView({
behavior:"smooth"
});

},100);

}

function increaseTasbeeh(){

navigator.vibrate?.(40);

freeCounter++;

document.getElementById(
"freeCounter"
).innerText = freeCounter;

}

</script>

</body>
</html>

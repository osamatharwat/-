<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>

<title>حصنك اليومي ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
}

html{
scroll-behavior:smooth;
}

body{
background:#0f172a;
color:#f8fafc;
min-height:100vh;
overflow-x:hidden;
padding:12px;
transition:.5s;
}

/* ========================= */
/* THEMES */
/* ========================= */

body.morning-theme{
background:#eef4f8;
color:#0f172a;
}

body.evening-theme{
background:#0f172a;
color:#f8fafc;
}

body.quick-theme{
background:#102a22;
color:#f8fafc;
}

/* ========================= */
/* LAYOUT */
/* ========================= */

.container{
width:100%;
max-width:480px;
margin:auto;
}

.header{
text-align:center;
margin-top:6px;
margin-bottom:16px;
}

/* ========================= */
/* HERO */
/* ========================= */

.hero-sadaka{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.08);
padding:18px 14px;
border-radius:24px;
margin-bottom:18px;
backdrop-filter:blur(10px);
}

.sadaka-title{
font-size:18px;
font-weight:800;
color:#fde68a;
margin-bottom:10px;
}

.sadaka-names{
font-size:24px;
font-weight:900;
line-height:1.8;
}

.logo{
font-size:30px;
font-weight:900;
}

/* ========================= */
/* QUOTE */
/* ========================= */

.quote-box{
background:rgba(255,255,255,.72);
border:1px solid rgba(255,255,255,.35);
color:#475569;
padding:14px;
border-radius:18px;
text-align:center;
margin-bottom:14px;
font-size:15px;
line-height:1.8;
backdrop-filter:blur(8px);
}

/* ========================= */
/* STREAK */
/* ========================= */

.streak{
text-align:center;
margin-bottom:18px;
font-size:18px;
color:#f97316;
font-weight:bold;
}

/* ========================= */
/* BUTTONS */
/* ========================= */

.mode-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:18px;
}

.mode-btn{
border:none;
padding:16px 10px;
border-radius:20px;
cursor:pointer;
color:white;
font-size:15px;
font-weight:800;
transition:.3s;
}

.mode-btn:active{
transform:scale(.96);
}

.morning{
background:linear-gradient(135deg,#38bdf8,#2563eb);
}

.evening{
background:linear-gradient(135deg,#6366f1,#312e81);
}

.quick{
background:linear-gradient(135deg,#22c55e,#15803d);
}

.tasbeeh{
background:linear-gradient(135deg,#06b6d4,#0f766e);
}

/* ========================= */
/* CARD */
/* ========================= */

.card{
display:none;
background:rgba(255,255,255,.78);
border:1px solid rgba(255,255,255,.35);
padding:16px;
border-radius:24px;
backdrop-filter:blur(10px);
animation:fade .4s ease;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

@keyframes fade{

from{
opacity:0;
transform:translateY(15px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* ========================= */
/* TOP BAR */
/* ========================= */

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
margin-bottom:16px;
}

.stats{
display:flex;
gap:8px;
}

.stat{
background:rgba(255,255,255,.8);
padding:8px 12px;
border-radius:12px;
font-size:13px;
color:#0f172a;
font-weight:700;
}

.mascot-area{
display:flex;
align-items:center;
gap:8px;
}

.mascot{
font-size:42px;
animation:floaty 3s infinite ease-in-out;
}

@keyframes floaty{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-5px);
}

}

.speech{
background:white;
color:#0f172a;
padding:8px 12px;
border-radius:14px;
font-size:11px;
font-weight:800;
max-width:120px;
line-height:1.6;
box-shadow:0 10px 20px rgba(0,0,0,.12);
}

/* ========================= */
/* PROGRESS */
/* ========================= */

.progress-container{
width:100%;
height:10px;
background:#cbd5e1;
border-radius:50px;
overflow:hidden;
margin-bottom:16px;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#16a34a);
transition:.4s;
}

/* ========================= */
/* ZEKR */
/* ========================= */

.zekr-title{
text-align:center;
font-size:22px;
color:#ca8a04;
margin-bottom:14px;
font-weight:800;
}

.zekr-text{
line-height:2.5;
font-size:20px;
text-align:center;
margin-bottom:18px;
white-space:pre-line;
color:#0f172a;
font-weight:600;
}

.repeat{
text-align:center;
font-size:16px;
margin-bottom:10px;
color:#334155;
}

.counter{
text-align:center;
font-size:42px;
font-weight:900;
margin-bottom:16px;
color:#0f172a;
}

.glow{
animation:glow .4s ease;
}

@keyframes glow{

0%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

100%{
transform:scale(1);
}

}

/* ========================= */
/* BUTTON */
/* ========================= */

.btn{
width:100%;
border:none;
padding:16px;
border-radius:18px;
cursor:pointer;
color:white;
font-size:18px;
font-weight:800;
}

.main-btn{
background:linear-gradient(135deg,#22c55e,#15803d);
box-shadow:0 8px 20px rgba(34,197,94,.25);
}

/* ========================= */
/* FINISH */
/* ========================= */

.finish{
display:none;
text-align:center;
padding:24px 8px;
}

.finish h2{
font-size:34px;
margin-bottom:12px;
}

.finish p{
font-size:17px;
line-height:1.8;
color:#475569;
}

/* ========================= */
/* TASBEEH */
/* ========================= */

.tasbeeh-area{
display:none;
}

.tasbeeh-select{
width:100%;
padding:14px;
border-radius:16px;
border:none;
margin-bottom:18px;
font-size:16px;
}

.tasbeeh-counter{
text-align:center;
font-size:58px;
margin:24px 0;
font-weight:900;
color:#0f172a;
}

/* ========================= */
/* FOOTER */
/* ========================= */

.footer{
text-align:center;
margin-top:24px;
color:#94a3b8;
font-size:12px;
padding-bottom:50px;
}

@media(max-width:480px){

.speech{
max-width:95px;
font-size:10px;
padding:6px 10px;
}

.zekr-text{
font-size:18px;
line-height:2.3;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="hero-sadaka">

<div class="sadaka-title">
🤍 صدقة جارية على روح 🤍
</div>

<div class="sadaka-names">
خالد آدم • عمرو خالد • محمود فوزي
</div>

</div>

<div class="logo">
حصنك اليومي ✨
</div>

</div>

<div class="quote-box" id="quote"></div>

<div class="streak">
🔥 الاستريك:
<span id="streak">1</span>
يوم
</div>

<div class="mode-grid">

<button class="mode-btn morning" onclick="startMode('morning')">
🌅 أذكار الصباح
</button>

<button class="mode-btn evening" onclick="startMode('evening')">
🌙 أذكار المساء
</button>

<button class="mode-btn quick" onclick="startMode('quick')">
⚡ الجامع المختصر
</button>

<button class="mode-btn tasbeeh" onclick="openTasbeeh()">
📿 التسبيح الحر
</button>

</div>

<div class="card" id="card">

<div class="top-bar">

<div class="stats">

<div class="stat">
XP:
<span id="xp">0</span>
</div>

<div class="stat">
🔥 Combo:
<span id="combo">0</span>
</div>

</div>

<div class="mascot-area">

<div class="speech" id="speech">
جاهز تبدأ؟ 🌿
</div>

<div class="mascot">
🐥
</div>

</div>

</div>

<div class="progress-container">
<div class="progress" id="progress"></div>
</div>

<div class="zekr-title" id="zekrTitle"></div>

<div class="zekr-text" id="zekrText"></div>

<div class="repeat">
التكرار:
<span id="repeat"></span>
مرة
</div>

<div class="counter" id="counter">
0
</div>

<button class="btn main-btn" onclick="countZekr()">
سبحت ✅
</button>

</div>

<div class="finish" id="finish">

<h2>
🏆 أحسنت
</h2>

<p id="finishText">
تم إنهاء الورد اليومي 🌿
</p>

</div>

<div class="footer">
شارك التطبيق تؤجر عليه ❤️
</div>

</div>

<script>

const quotes = [

"ألا بذكر الله تطمئن القلوب",
"واذكر ربك إذا نسيت",
"إن الله مع الصابرين",
"فاذكروني أذكركم",
"ولا تيأسوا من روح الله",
"كل تسبيحة نور 🤍",
"جنة القلب في ذكر الله"

];

document.getElementById("quote").innerText =
quotes[Math.floor(Math.random()*quotes.length)];

const ayatKursi = `اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَن ذَا الَّذِي يَشْفَعُ عِندَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ`;

const data = {

morning:[
{
title:"آية الكرسي",
text:ayatKursi,
repeat:1
},
{
title:"سورة الإخلاص",
text:`قُلْ هُوَ اللَّهُ أَحَدٌ
اللَّهُ الصَّمَدُ
لَمْ يَلِدْ وَلَمْ يُولَدْ
وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ`,
repeat:3
}
],

evening:[
{
title:"آية الكرسي",
text:ayatKursi,
repeat:1
}
],

quick:[
{
title:"بسم الله الذي لا يضر",
text:`بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ`,
repeat:3
}
]

};

let currentMode = [];
let currentIndex = 0;
let currentCount = 0;
let xp = 0;
let combo = 0;

function startMode(mode){

document.body.classList.remove(
"morning-theme",
"evening-theme",
"quick-theme"
);

if(mode === "morning"){
document.body.classList.add("morning-theme");
}

if(mode === "evening"){
document.body.classList.add("evening-theme");
}

if(mode === "quick"){
document.body.classList.add("quick-theme");
}

document.getElementById("card").style.display="block";

currentMode = data[mode];

currentIndex = 0;
currentCount = 0;
xp = 0;
combo = 0;

loadZekr();

setTimeout(()=>{

document.getElementById("card")
.scrollIntoView({
behavior:"smooth"
});

},100);

}

function loadZekr(){

const item = currentMode[currentIndex];

document.getElementById("zekrTitle").innerText =
item.title;

document.getElementById("zekrText").innerText =
item.text;

document.getElementById("repeat").innerText =
item.repeat;

document.getElementById("counter").innerText =
`${currentCount}/${item.repeat}`;

updateProgress();

}

function countZekr(){

const item = currentMode[currentIndex];

currentCount++;

xp += 5;
combo++;

document.getElementById("xp").innerText = xp;
document.getElementById("combo").innerText = combo;

document.getElementById("counter").innerText =
`${currentCount}/${item.repeat}`;

if(currentCount >= item.repeat){

currentIndex++;
currentCount = 0;

if(currentIndex >= currentMode.length){

document.getElementById("card").style.display="none";

document.getElementById("finish").style.display="block";

document.getElementById("speech").innerText =
"أشطر كتكوت 🐥🏆";

return;

}

loadZekr();

}

}

function updateProgress(){

let percent =
(currentIndex/currentMode.length)*100;

document.getElementById("progress")
.style.width = percent + "%";

}

</script>

</body>
</html>
